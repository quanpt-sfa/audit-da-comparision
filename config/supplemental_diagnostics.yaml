  raw_input: data/raw/financial_statement_full_long.csv.gz
  line_item_input: artifacts/next_diagnostics/cfs_line_item_long.csv
  mapping_config: config/cfs_shifting_validation.yaml
  output_dir: artifacts/supplemental_diagnostics

settings:
  audited_label: audited
  unaudited_label: unaudited
  minimum_year: 2016
  maximum_year: 2025

  # Cash-flow line-item revision concentration.
  concentration_draws: 1000
  concentration_min_active_concepts: 2
  concentration_absolute_tolerance: 0.0
  concentration_pool_minimum: 25

  # Near-zero CFO sign-shift design.
  near_zero_threshold: 0.02
  near_zero_distance_bins: 10
  near_zero_draws: 5000

  bootstrap_draws: 2000
  seed: 20260723
