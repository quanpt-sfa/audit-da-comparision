paths:
  input: data/raw/financial_statement_full_long.csv.gz
  unrestricted_panel: data/processed/accrual_panel_unrestricted.csv.gz
  processed_panel: data/processed/accrual_panel.csv.gz
  population_eligible_keys: artifacts/population_lock/population_eligible_keys.csv
  industry_input: data/raw/bctc_industry_icb.csv
  audit_metadata_input: data/raw/bctc_audit_annual_long.csv
  posterior_output: artifacts/paired_da_posterior.csv.gz
  fold_output: artifacts/rolling_fold_diagnostics.csv
  report_output: artifacts/SIGNAL_GATE_REPORT.md
  baseline_output: artifacts/ols_baselines.csv.gz
  profile_output: artifacts/input_profile.json

analysis_window:
  source_start_year: 2015
  source_end_year: 2025
  training_start_year: 2015
  test_start_year: 2016
  test_end_year: 2025

input:
  chunksize: 250000
  audited_label: audited
  unaudited_label: unaudited
  required_scope: consolidated
  allowed_identity_status:
    - exact
    - casefold_match
  minimum_year: 2015
  maximum_year: 2025

sample:
  exclude_financial_firms: true
  unknown_industry_policy: exclude
  retain_excluded_rows_in_master_panel: true

items:
  assets: balance_sheet__a_tong_cong_tai_san
  current_assets: balance_sheet__i_tai_san_ngan_han
  cash: balance_sheet__1_tien_va_tuong_duong_tien
  current_liabilities: balance_sheet__1_no_ngan_han
  short_term_debt: balance_sheet__1_10_vay_va_no_thue_tai_chinh_ngan_han
  tax_payable: balance_sheet__1_3_thue_va_cac_khoan_phai_tra_nha_nuoc
  receivables: balance_sheet__3_1_phai_thu_ngan_han_cua_khach_hang
  inventory_gross: balance_sheet__4_1_hang_ton_kho
  inventory_net: balance_sheet__4_hang_ton_kho_rong
  ppe_gross: balance_sheet__2_1_1_nguyen_gia_tscd_huu_hinh
  ppe_net: balance_sheet__2_1_gtcl_tscd_huu_hinh
  revenue: income_statement__3_doanh_thu_thuan
  operating_profit: income_statement__11_loi_nhuan_thuan_tu_hoat_dong_kinh_doanh
  pbt: income_statement__16_tong_loi_nhuan_ke_toan_truoc_thue
  pat: income_statement__18_loi_nhuan_sau_thue_thu_nhap_doanh_nghiep
  depreciation: cash_flow_indirect__2_khau_hao_tscd_va_bdsdt_gt
  cfo_indirect: cash_flow_indirect__i_luu_chuyen_tien_thuan_tu_hoat_dong_kinh_doanh_gt
  cfo_direct: cash_flow_direct__i_luu_chuyen_tien_te_rong_tu_cac_hoat_dong_san_xuat_kinh_doanh_tt
  cfi: cash_flow_indirect__ii_luu_chuyen_tien_thuan_tu_hoat_dong_dau_tu_gt
  cff: cash_flow_indirect__iii_luu_chuyen_tien_thuan_tu_hoat_dong_tai_chinh_gt
  net_cash_change: cash_flow_indirect__iv_luu_chuyen_tien_thuan_trong_ky_gt
  cash_begin_cfs: cash_flow_indirect__v_tien_va_tuong_duong_tien_dau_ky_gt
  fx_effect: cash_flow_indirect__vi_anh_huong_cua_chenh_lech_ty_gia_gt
  cash_end_cfs: cash_flow_indirect__vii_tien_va_tuong_duong_tien_cuoi_ky_gt

panel:
  primary_total_accruals: cash_flow
  fallback_total_accruals: balance_sheet
  minimum_lag_assets: 1.0
  winsor_lower: 0.01
  winsor_upper: 0.99

models:
  training_start_year: 2015
  minimum_train_rows: 500
  minimum_validation_rows: 100
  minimum_firm_history: 1
  posterior_draws: 400
  random_seed: 20260719
  candidate_models:
    jones:
      - inv_assets
      - drev_scaled
      - ppe_scaled
    modified_jones:
      - inv_assets
      - drev_drec_scaled
      - ppe_scaled
    kothari:
      - inv_assets
      - drev_drec_scaled
      - ppe_scaled
      - roa
    nonlinear_modified_jones:
      - inv_assets
      - drev_drec_scaled
      - ppe_scaled
      - roa
      - loss
      - drev_drec_sq

signal:
  benchmarks:
    - version_specific
    - pre_reference
    - audited_reference
  rho_grid: [0.0, 0.5, 0.9, 1.0]
  error_sd_ratio_grid: [1.0]
  delta_grid: [0.0, 0.0025, 0.005, 0.01]
  decisive_probability: 0.80
  minimum_test_year: 2016
  maximum_test_year: 2025

report:
  minimum_pairs: 500
  minimum_decisive_rate: 0.05
  minimum_benchmark_direction_agreement: 0.67
