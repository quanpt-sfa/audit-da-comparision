paths:
  baseline_input: artifacts/ols_baselines.csv.gz
  panel_input: data/processed/accrual_panel.csv.gz
  output_dir: artifacts/next_diagnostics
  audit_metadata_input: data/processed/audit_metadata.csv

data:
  audited_label: audited
  unaudited_label: unaudited

tail_audit:
  primary_model: modified_jones
  primary_benchmark: audited_reference
  tail_fraction: 0.01
  manual_cases_per_side: 30
  special_year: 2024

decomposition:
  cfo_to_pat_ratio_grid: [1.0, 2.0, 5.0, 10.0]
  reduction_materiality_grid: [0.0, 0.0025, 0.005, 0.01]
  trim_fraction: 0.01
  asset_pre_post_gap_threshold: 0.05
  asset_growth_multiple_threshold: 5.0
  small_lag_assets_quantile: 0.01
  repeated_candidate_min_years: 2

cfs_identity:
  primary_model: modified_jones
  primary_benchmark: audited_reference
  absolute_tolerance_vnd: 1000.0
  scaled_tolerance: 1.0e-8
  offset_closure_scaled_tolerance: 1.0e-6
  material_cfo_threshold: 0.05
  cfo_to_pat_ratio_threshold: 5.0
  trim_fraction: 0.01

cfo_tilt:
  primary_model: modified_jones
  primary_benchmark: audited_reference
  cfo_to_pat_ratio_grid: [1.0, 2.0, 5.0, 10.0]
  reduction_tolerance_grid: [0.0, 0.0025, 0.005, 0.01]
  trim_fraction: 0.01
  asset_pre_post_gap_threshold: 0.05
  asset_growth_multiple_threshold: 5.0
  small_lag_assets_quantile: 0.01
  candidate_abs_cfo_threshold: 0.05
  persistence_cfo_to_pat_threshold: 5.0

component_placebo:
  models: [jones, modified_jones, kothari, nonlinear_modified_jones]
  benchmarks: [pre_reference, audited_reference, version_specific]
  components: [pat, cfo]
  conditioning_bins:
    within: [fiscal_year]
    size_bins: 5
    abs_da_pre_bins: 5
    abs_component_bins: 5
  minimum_stratum_size: 20
  permutations: 1000
  trim_fraction: 0.01
  random_seed: 20260720

cfs_deep_dive:
  minimum_year: 2018
  candidate_label: identity_consistent_offsetting_reclassification_candidate
  direction_tolerance: 0.0
  dominant_offset_share_threshold: 0.60
  trim_fraction: 0.01
  chronic_min_candidate_years: 4
  chronic_candidate_share: 0.75
  direction_consistency_threshold: 0.80
  material_cfo_threshold: 0.05
  near_zero_cfo_threshold: 0.01
  current_ratio_threshold: 1.0
  low_cash_threshold: 0.02
  unaudited_label: unaudited
  pdf_sample_size: 40
  pdf_fail_to_pass_quota: 5
  pdf_insufficient_quota: 5
  random_seed: 20260720
  audit_metadata:
    auditor_column: auditor_name
    opinion_column: audit_opinion
    big4_patterns:
      - deloitte
      - kpmg
      - ernst
      - ey
      - pricewaterhouse
      - pwc
    nonclean_patterns:
      - qualified
      - adverse
      - disclaimer
      - except for
      - going concern
      - ngoại trừ
      - không chấp nhận
      - từ chối
      - hoạt động liên tục

sign_transitions:
  sign_epsilon_grid: [0.0, 0.0025, 0.005, 0.01]
  reduction_delta_grid: [0.0, 0.0025, 0.005, 0.01]

placebo:
  models: [jones, modified_jones, kothari, nonlinear_modified_jones]
  common_benchmarks: [pre_reference, audited_reference]
  strata_columns: [fiscal_year, raw_exchange]
  conditioning_bins:
    within: [fiscal_year]
    size_bins: 5
    abs_da_pre_bins: 5
    abs_adjustment_bins: 0
  minimum_stratum_size: 20
  permutations: 1000
  trim_fraction: 0.01
  random_seed: 20260719
  identity_tolerance: 1.0e-8

calibration:
  minimum_test_year: 2018
  maximum_test_year: 2025
  minimum_train_rows: 500
  minimum_validation_rows: 100
  winsor_lower: 0.01
  winsor_upper: 0.99
  random_seed: 20260719
  student_t_df_grid: [3, 5, 10, 30]
  candidate_models:
    jones: [inv_assets, drev_scaled, ppe_scaled]
    modified_jones: [inv_assets, drev_drec_scaled, ppe_scaled]
    kothari: [inv_assets, drev_drec_scaled, ppe_scaled, roa]
    nonlinear_modified_jones: [inv_assets, drev_drec_scaled, ppe_scaled, roa, loss, drev_drec_sq]

model_families:
  families:
    classic: [jones, modified_jones]
    performance_adjusted: [kothari, nonlinear_modified_jones]
  tolerance_grid: [0.0, 0.0025, 0.005, 0.01]

report:
  special_year: 2024
  pandemic_years: [2021, 2022]
