paths:
  # Legacy runner path retained for backward comparison only.
  panel_input: data/processed/accrual_panel.csv.gz
  output_dir: artifacts/manuscript_results

  # Final runner separates locked test cases from unrestricted history.
  analysis_panel_input: data/processed/accrual_panel.csv.gz
  training_panel_input: data/processed/accrual_panel_unrestricted.csv.gz
  final_output_dir: artifacts/manuscript_results_final

columns:
  industry: icb_l1

sample:
  exclude_financial_firms: true
  unknown_industry_policy: exclude

panel_contract:
  required_columns:
    - icb_l1
    - financial_flag
    - auditor_group
    - big4_flag
    - audit_opinion_group

# Retained for scripts 32/33 and historical comparison.
method_contract:
  version: results-method-contract-v1
  jones_ordinary_intercept: false
  jones_feature_centering: false
  jones_scale_regressor: inv_assets
  attribution_estimand: three_player_pat_cfo_benchmark_residual
  attribution_players:
    - pat
    - cfo
    - benchmark_residual
  signed_shift_reassignment_cell: fiscal_year

# Authoritative core contract for scripts 34/35.
final_method_contract:
  version: final-results-contract-v4
  analysis_population: locked_nonfinancial_panel
  training_population: unrestricted_nonfinancial_history
  source_start_year_role: lag_support_only
  lag_support_years: 1
  model_test_start_rule: training_start_plus_one
  require_training_start_year: true
  jones_ordinary_intercept: false
  jones_feature_centering: false
  jones_scale_regressor: inv_assets
  current_test_outcome_clipping: false
  attribution_estimand: two_player_pat_cfo_fixed_reference
  attribution_players:
    - pat
    - cfo
  attribution_benchmarks:
    - audited_reference
    - pre_reference
  direct_switching_population: common_complete_case
  signed_shift_reassignment_cell: fiscal_year
  applied_primary_test: paired_difference
  stacked_state_slopes: fully_interacted
  signed_da_difference_family: one_unique_test_per_focal
  supplemental_scope: separate_reproducible_runner

settings:
  audited_label: audited
  unaudited_label: unaudited
  # 2015 supplies lagged assets and year-over-year changes only.
  source_start_year: 2015
  # 2016 is the first model-complete audited estimation year.
  training_start_year: 2016
  # 2017 is the first model-based test year; direct comparisons still retain 2016.
  test_start_year: 2017
  test_end_year: 2025
  min_train_rows: 100
  min_industry_rows: 40
  trailing_years: 5
  winsor_lower: 0.01
  winsor_upper: 0.99
  bootstrap_draws: 2000
  simulation_draws: 2000
  seed: 20260723
  profit_thresholds: [0.025, 0.05, 0.075, 0.10]
  direct_thresholds: [0.0025, 0.005, 0.01, 0.02]
  tail_quantile: 0.90
  negligible_sd: 1.0e-12
  parallel_workers: 31
  simulation_batch_size: 32
  blas_threads_per_worker: 1
