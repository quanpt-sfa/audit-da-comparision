paths:
  raw_input: data/raw/financial_statement_full_long.csv.gz
  panel_input: data/processed/accrual_panel.csv.gz
  industry_input: data/raw/bctc_industry_icb.csv
  output_dir: artifacts/next_diagnostics

upstream:
  observed_cases_table: cfs_offset_channel_cases

cfs_shifting_validation:
  audited_label: audited
  unaudited_label: unaudited
  required_scope: consolidated
  allowed_identity_status: [exact, casefold_match]
  statement_family_regex: 'cash[_ ]?flow'
  statement_family_preference: [cash_flow_indirect, cash_flow_direct]
  chunksize: 250000
  minimum_year: 2018
  maximum_year: 2025
  minimum_test_year: 2018
  maximum_test_year: 2025
  minimum_train_rows: 500
  ridge: 1.0e-8
  material_cfo_threshold: 0.05
  candidate_label: identity_consistent_offsetting_reclassification_candidate
  fold_winsor_lower: 0.01
  fold_winsor_upper: 0.99
  incremental_reference_model: raw_cfo_level

  # Exact schema of data/raw/bctc_industry_icb.csv supplied for this project.
  # The file is a static ticker-level mapping with no fiscal-year or numeric ICB-code column.
  industry_mapping:
    required: true
    ticker_column: issuer_ticker
    industry_column: icb_l1
    icb_level_columns: [icb_l1, icb_l2, icb_l3, icb_l4, icb_l5]
    retain_columns: [source_ticker_raw, firm_name_raw, exchange_raw]
    financial_industry_values: ['Tài chính', 'Ngân hàng']
    missing_industry_is_unknown: true

  # Apply these restrictions before constructing firm history and before every
  # rolling-fold fit/test. This prevents financial firms from contaminating the
  # expected-CFO coefficients used for the non-financial research population.
  estimation_sample:
    require_nonfinancial: true
    require_listed: true
    listed_exchanges: [HOSE, HNX, UPCOM]
    require_valid_ticker: true
    require_positive_lag_assets: true

  proxy_models:
    sales_level_only: [inv_assets, pre_revenue_scaled]
    roychowdhury_sales: [inv_assets, pre_revenue_scaled, pre_drev_scaled]
    earnings_conditioned: [inv_assets, pre_revenue_scaled, pre_drev_scaled, pre_pat_scaled]
    earnings_working_capital: [inv_assets, pre_pat_scaled, pre_drev_scaled, pre_drec_scaled, pre_loss]
    earnings_working_capital_history: [inv_assets, pre_pat_scaled, pre_drev_scaled, pre_drec_scaled, pre_loss, firm_prior_cfo_median]

  # Primary comparison excludes firm-history because its first observation per issuer is unavailable.
  common_primary_models:
    - sales_level_only
    - roychowdhury_sales
    - earnings_conditioned
    - earnings_working_capital
    - raw_cfo_level
    - within_year_cfo_percentile

  # All-model comparison quantifies the sample cost and incremental value of
  # both the standalone history score and the nested EWC+history model.
  common_all_models:
    - sales_level_only
    - roychowdhury_sales
    - earnings_conditioned
    - earnings_working_capital
    - earnings_working_capital_history
    - raw_cfo_level
    - within_year_cfo_percentile
    - firm_history_deviation

  history_nested_comparison:
    base_model: earnings_working_capital
    nested_model: earnings_working_capital_history
    sample_mode: common_all_models
    sample_restriction: analysis_core

  # Backward-compatible alias used only by older scripts.
  common_sample_models:
    - sales_level_only
    - roychowdhury_sales
    - earnings_conditioned
    - earnings_working_capital
    - raw_cfo_level
    - within_year_cfo_percentile

  sample_restrictions:
    listed_exchanges: [HOSE, HNX, UPCOM]
    lag_assets_floor_quantile: 0.01
    require_scale_scope_screening: false
    scale_scope_waiver_reason: >-
      Source-controlled preliminary and audited records use the same provider,
      monetary unit, consolidated scope, and reporting-period convention.
      Comparability is documented in the paper rather than screened empirically.
    scale_scope_flag_columns:
      - combined_scale_scope_flag
      - scale_scope_flag
      - asset_pre_post_gap_flag
      - asset_growth_flag
      - small_lag_assets_flag

  pdf_verification:
    quotas:
      cff_down_borrowing: 12
      cfi_up_ppe: 10
      cfi_up_loans: 10
      reconciliation_outliers: 10
    force_cases:
      - issuer_ticker: DBT
        fiscal_year: 2024
        reason: Prespecified reconciliation exception from the prior diagnostic run

  concept_sections:
    cfo_customer_receipts: operating
    cfo_supplier_payments: operating
    cfo_employee_payments: operating
    cfo_interest_paid: operating
    cfo_income_tax_paid: operating
    cfo_other_receipts: operating
    cfo_other_payments: operating
    cfi_ppe_purchase: investing
    cfi_ppe_sale: investing
    cfi_loans_advanced: investing
    cfi_loans_collected: investing
    cfi_investment_purchase: investing
    cfi_investment_sale: investing
    cfi_interest_received: investing
    cfi_dividends_received: investing
    cfi_interest_dividends_received: investing
    cff_borrowing_proceeds: financing
    cff_debt_repayments: financing
    cff_lease_principal_payments: financing
    cff_owner_contributions: financing
    cff_share_repurchases: financing
    cff_dividends_paid: financing

  line_item_rules:
    - concept: cfo_customer_receipts
      section: operating
      include: ['(tien[_ ]thu|thu[_ ]tien).*(ban[_ ]hang|cung[_ ]cap[_ ]dich[_ ]vu|doanh[_ ]thu)']
    - concept: cfo_supplier_payments
      section: operating
      include: ['(tien[_ ]chi|chi[_ ]tien).*(nguoi[_ ]cung[_ ]cap|mua[_ ]hang[_ ]hoa|mua[_ ]dich[_ ]vu)']
    - concept: cfo_employee_payments
      section: operating
      include: ['(tien[_ ]chi|chi[_ ]tien).*(nguoi[_ ]lao[_ ]dong|nhan[_ ]vien)']
    - concept: cfo_interest_paid
      section: operating
      include: ['lai[_ ]vay.*(da[_ ]tra|chi[_ ]tra|tra)']
    - concept: cfo_income_tax_paid
      section: operating
      include: ['thue[_ ]thu[_ ]nhap[_ ]doanh[_ ]nghiep.*(da[_ ]nop|chi[_ ]tra|nop)']
    - concept: cfo_other_receipts
      section: operating
      include: ['(tien[_ ]thu|thu[_ ]tien).*khac.*hoat[_ ]dong.*kinh[_ ]doanh']
    - concept: cfo_other_payments
      section: operating
      include: ['(tien[_ ]chi|chi[_ ]tien).*khac.*hoat[_ ]dong.*kinh[_ ]doanh']

    - concept: cfi_ppe_purchase
      section: investing
      include: ['(tien[_ ]chi|chi[_ ]tien).*(mua[_ ]sam|xay[_ ]dung).*(tscd|tai[_ ]san[_ ]co[_ ]dinh|bdsdt|bat[_ ]dong[_ ]san[_ ]dau[_ ]tu)']
    - concept: cfi_ppe_sale
      section: investing
      include: ['(tien[_ ]thu|thu[_ ]tien).*(thanh[_ ]ly|nhuong[_ ]ban).*(tscd|tai[_ ]san[_ ]co[_ ]dinh|bdsdt|bat[_ ]dong[_ ]san[_ ]dau[_ ]tu)']
    - concept: cfi_loans_advanced
      section: investing
      include: ['(tien[_ ]chi|chi[_ ]tien).*(cho[_ ]vay|mua.*cong[_ ]cu[_ ]no|dau[_ ]tu.*nam[_ ]giu.*dao[_ ]han)']
    - concept: cfi_loans_collected
      section: investing
      include: ['(tien[_ ]thu|thu[_ ]tien).*(thu[_ ]hoi.*cho[_ ]vay|thu[_ ]hoi.*cong[_ ]cu[_ ]no|thu[_ ]hoi.*dau[_ ]tu.*nam[_ ]giu.*dao[_ ]han)']
    - concept: cfi_investment_purchase
      section: investing
      include: ['(tien[_ ]chi|chi[_ ]tien).*(gop[_ ]von|dau[_ ]tu.*don[_ ]vi[_ ]khac|mua.*cong[_ ]ty[_ ]con)']
    - concept: cfi_investment_sale
      section: investing
      include: ['(tien[_ ]thu|thu[_ ]tien).*(thu[_ ]hoi.*gop[_ ]von|thu[_ ]hoi.*dau[_ ]tu.*don[_ ]vi[_ ]khac|ban.*khoan[_ ]dau[_ ]tu|thanh[_ ]ly.*cong[_ ]ty[_ ]con)']
    - concept: cfi_interest_received
      section: investing
      include:
        - '(tien[_ ]thu|thu[_ ]tien).*lai[_ ]cho[_ ]vay'
        - 'tien[_ ]lai[_ ]da[_ ]nhan'
        - '(^|[_ ])thu[_ ]lai($|[_ ])'
      exclude: ['co[_ ]tuc|loi[_ ]nhuan']
    - concept: cfi_dividends_received
      section: investing
      include:
        - '(tien[_ ]thu|thu[_ ]tien).*(co[_ ]tuc|loi[_ ]nhuan.*duoc[_ ]chia)'
        - '(co[_ ]tuc|loi[_ ]nhuan.*duoc[_ ]chia).*(da[_ ]nhan|nhan)'
      exclude: ['lai[_ ]cho[_ ]vay|thu[_ ]lai']
    - concept: cfi_interest_dividends_received
      section: investing
      include:
        - 'thu[_ ]lai.*co[_ ]tuc'
        - 'lai.*(co[_ ]tuc|loi[_ ]nhuan.*duoc[_ ]chia)'
        - '(co[_ ]tuc|loi[_ ]nhuan).*lai'

    - concept: cff_borrowing_proceeds
      section: financing
      include: ['(tien[_ ]thu|thu[_ ]tien).*(di[_ ]vay|phat[_ ]hanh.*trai[_ ]phieu)']
    - concept: cff_debt_repayments
      section: financing
      include:
        - '(tien[_ ]chi|chi[_ ]tien|tien[_ ]tra|tien[_ ]thanh[_ ]toan|thanh[_ ]toan).*(tra[_ ]no[_ ]goc[_ ]vay|tra[_ ]goc[_ ]vay|tra[_ ]no.*vay|hoan[_ ]tra.*vay|mua[_ ]lai.*trai[_ ]phieu)'
        - '(^|[_ ])tra[_ ]no[_ ]goc[_ ]vay($|[_ ])'
      exclude: ['thue[_ ]tai[_ ]chinh|di[_ ]thue']
    - concept: cff_lease_principal_payments
      section: financing
      include:
        - '(tien[_ ]chi|chi[_ ]tien|tien[_ ]tra|tien[_ ]thanh[_ ]toan|thanh[_ ]toan).*(von[_ ]goc.*di[_ ]thue[_ ]tai[_ ]chinh|no[_ ]goc.*thue[_ ]tai[_ ]chinh|tra[_ ]no.*thue[_ ]tai[_ ]chinh|goc[_ ]thue[_ ]tai[_ ]chinh)'
        - 'tien[_ ]thanh[_ ]toan[_ ]von[_ ]goc[_ ]di[_ ]thue[_ ]tai[_ ]chinh'
    - concept: cff_owner_contributions
      section: financing
      include: ['(tien[_ ]thu|thu[_ ]tien).*(phat[_ ]hanh.*co[_ ]phieu|nhan[_ ]von[_ ]gop|von[_ ]gop.*chu[_ ]so[_ ]huu)']
    - concept: cff_share_repurchases
      section: financing
      include:
        - '(tien[_ ]chi|chi[_ ]tien|tien[_ ]tra).*(mua[_ ]lai.*co[_ ]phieu|tra[_ ]lai[_ ]von[_ ]gop|mua[_ ]lai.*von[_ ]gop)'
        - 'tien[_ ]tra[_ ]lai[_ ]von[_ ]gop.*mua[_ ]lai[_ ]co[_ ]phieu'
    - concept: cff_dividends_paid
      section: financing
      include: ['(tien[_ ]chi|chi[_ ]tien).*(co[_ ]tuc|loi[_ ]nhuan.*da[_ ]chia)|(co[_ ]tuc|loi[_ ]nhuan).*(da[_ ]tra|chi[_ ]tra)']
